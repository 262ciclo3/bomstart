site_name: BOM START
site_description: Proyecto integrador del ciclo 3 con REQ, BD1 y LP1.
site_author: UPeU
copyright: Angel Sullon @asullom - UPeU 2026
theme:
  name: material
  language: es
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - toc.integrate
    - content.code.copy
  palette:
    - scheme: default
      primary: indigo
      accent: teal

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - toc:
      permalink: true

nav:
  - Inicio: index.md
  - Proyecto Integrador:
      - Alineamiento: proyecto-integrador/index.md
      - Unidad 1:
          - Producto integrado U1: proyecto-integrador/u1/index.md
          - REQ Producto U1: proyecto-integrador/u1/req-producto.md
          - Prototipos U1: proyecto-integrador/u1/prototipos-u1.md
          - BD1 Producto U1: proyecto-integrador/u1/bd1-producto.md
          - LP1 Demo U1: proyecto-integrador/u1/lp1-demo.md
      - Unidad 2:
          - Producto integrado U2: proyecto-integrador/u2/index.md
          - REQ Producto U2: proyecto-integrador/u2/req-producto.md
          - BD1 Producto U2: proyecto-integrador/u2/bd1-producto.md
          - LP1 Demo U2: proyecto-integrador/u2/lp1-demo.md
      - Unidad 3:
