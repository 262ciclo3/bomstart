site_name: BOM START
site_description: Proyecto integrador del ciclo 3 con REQ, BD1 y LP1.
site_author: UPeU
copyright: Angel Sullon @asullom - UPeU 2026
theme:
  name: material
  language: es
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - toc.integrate
    - content.code.copy
  palette:
    - scheme: default
      primary: indigo
      accent: teal

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - toc:
      permalink: true

nav:
  - Inicio: index.md
  - REQ:
      - Silabo: req/index.md
      - Unidad 1:
          - Sesion 1: req/sesiones/sesion-01.md
