<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BOMstart U1 - Producto y categoría</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="app-header">
    <div>
      <p class="eyebrow">Producto U1 - LP1</p>
      <h1>Catálogo interactivo</h1>
      <p>Continúa con Producto de POO e incorpora Categoria como incremento de LP1.</p>
    </div>
  </header>

  <main class="layout">
    <section class="panel" aria-labelledby="form-title">
      <h2 id="form-title">Registrar producto</h2>
      <form id="productoForm" novalidate>
        <label>Nombre <input id="nombre" type="text" placeholder="Ej. Pack escolar"></label>
        <div class="grid-two">
          <label>Precio <input id="precio" type="number" min="0" step="0.01"></label>
          <label>Stock <input id="stock" type="number" min="0" step="1"></label>
        </div>
        <label>
          Categoría
          <select id="categoria">
            <option value="">Seleccione una categoría</option>
            <option value="Útiles">Útiles</option>
            <option value="Accesorios">Accesorios</option>
          </select>
        </label>
        <p id="mensaje" class="message" role="status" aria-live="polite"></p>
        <div class="actions">
          <button type="submit">Registrar producto</button>
          <button type="button" class="secondary" id="limpiarBtn">Limpiar</button>
        </div>
      </form>
    </section>

    <section class="summary" aria-label="Resumen del catálogo">
      <article><span id="totalProductos">0</span><p>Productos</p></article>
      <article><span id="totalStock">0</span><p>Unidades en stock</p></article>
      <article><span id="totalCategorias">0</span><p>Categorías usadas</p></article>
    </section>

    <section class="panel table-panel" aria-labelledby="table-title">
      <h2 id="table-title">Listado temporal de productos</h2>
      <div class="table-wrap">
        <table>
          <thead><tr><th>#</th><th>Producto</th><th>Precio</th><th>Stock</th><th>Categoría</th></tr></thead>
          <tbody id="productosBody"></tbody>
        </table>
      </div>
    </section>
  </main>
  <script src="app.js"></script>
</body>
</html>
